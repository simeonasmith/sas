<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.subtitle | default: site.description | strip_html | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}" />
</head>
<body>
  <header class="site-header">
    <div class="top-bar">
      <div>{{ site.time | date: "%A %-d %B %Y" }}</div>
      <a class="small-link" href="{{ '/admin/' | relative_url }}">Private desk</a>
    </div>

    <a class="masthead-link" href="{{ '/' | relative_url }}">
      <h1>{{ site.title }}</h1>
    </a>

    <p class="strapline">{{ site.description }}</p>

    <nav class="nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
      <a href="{{ '/archive/' | relative_url }}" {% if page.url == "/archive/" %}class="active"{% endif %}>Archive</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url == "/about/" %}class="active"{% endif %}>About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>© {{ site.time | date: "%Y" }} Simeon A. Smith</p>
  </footer>
</body>
</html>
